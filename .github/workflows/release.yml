name: Build corrosion for Debian/Ubuntu

on:
  workflow_dispatch:
    inputs:
      corrosion_version:
        description: The version of corrosion to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true
      architecture:
        description: Architecture to build (amd64, arm64, or 'all' for all architectures)
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'amd64'
          - 'arm64'

permissions:
  contents: write

jobs:
  build-corrosion:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout corrosion-debian
        uses: actions/checkout@v4

      - name: Build corrosion
        run: ./build.sh ${{ inputs.corrosion_version }} ${{ inputs.build_version }} ${{ inputs.architecture }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: |
            uncloud-corrosion_*.deb

  release-corrosion:
    name: (Draft-)Release corrosion for Debian/Ubuntu
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-corrosion
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Publish Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            uncloud-corrosion_*.deb
          name: ${{ inputs.corrosion_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.corrosion_version }}-${{ inputs.build_version }}
          fail_on_unmatched_files: true
